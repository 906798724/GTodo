<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quick Add Task</title>
  <style>
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #fafafa;
      --bg-tertiary: #f5f5f5;
      --text-primary: #1a1a1a;
      --text-secondary: #666666;
      --text-tertiary: #999999;
      --border-primary: #f0f0f0;
      --border-secondary: #e5e5e5;
      --accent-primary: #1a1a1a;
      --accent-hover: #333333;
      --accent-on: #ffffff;
      --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    [data-theme="dark"] {
      --bg-primary: #1a1a1a;
      --bg-secondary: #242424;
      --bg-tertiary: #2a2a2a;
      --text-primary: #f5f5f5;
      --text-secondary: #b0b0b0;
      --text-tertiary: #777777;
      --border-primary: #2a2a2a;
      --border-secondary: #333333;
      --accent-primary: #f5f5f5;
      --accent-hover: #ffffff;
      --accent-on: #0f0f0f;
      --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.2);
      --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      background: var(--bg-primary);
      border-radius: 16px;
      padding: 20px;
      box-shadow: var(--shadow-lg);
      width: 520px;
      min-height: 380px;
      border: 1px solid var(--border-primary);
      transition: all 0.3s ease;
      -webkit-app-region: drag;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .title {
      font-size: 13px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 500;
    }

    .title svg {
      width: 14px;
      height: 14px;
      color: var(--text-primary);
    }

    .theme-toggle {
      width: 28px;
      height: 28px;
      border: 1px solid var(--border-secondary);
      border-radius: 6px;
      background: var(--bg-secondary);
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      -webkit-app-region: no-drag;
    }

    .theme-toggle:hover {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }

    .theme-toggle svg {
      width: 14px;
      height: 14px;
    }

    .input-wrapper {
      position: relative;
      margin-bottom: 14px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      font-size: 15px;
      border: 1px solid var(--border-secondary);
      border-radius: 10px;
      outline: none;
      transition: all 0.2s;
      background: var(--bg-primary);
      color: var(--text-primary);
      -webkit-app-region: no-drag;
    }

    input::placeholder {
      color: var(--text-tertiary);
    }

    input:focus {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.04);
    }

    [data-theme="dark"] input:focus {
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.06);
    }

    .options {
      display: flex;
      margin-bottom: 14px;
    }

    .date-input {
      padding: 8px 10px;
      border: 1px solid var(--border-secondary);
      border-radius: 8px;
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 12px;
      cursor: pointer;
      outline: none;
      transition: all 0.2s;
      width: 130px;
      font-family: inherit;
      -webkit-app-region: no-drag;
    }

    .date-input::-webkit-calendar-picker-indicator {
      cursor: pointer;
      opacity: 0.6;
    }

    .date-input:hover {
      background: var(--bg-tertiary);
    }

    .date-input:focus {
      border-color: var(--accent-primary);
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 14px;
      align-items: center;
    }

    .tag-row-label {
      font-size: 11px;
      color: var(--text-tertiary);
      margin-right: 4px;
      flex-shrink: 0;
      padding-top: 2px;
    }

    .tag-chip {
      display: inline-flex;
      align-items: center;
      padding: 4px 8px;
      border: 1px solid var(--border-secondary);
      border-radius: 12px;
      background: var(--bg-secondary);
      color: var(--text-secondary);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .tag-chip:hover {
      background: var(--bg-tertiary);
      border-color: var(--text-tertiary);
    }

    .tag-chip.selected {
      border-color: var(--accent-primary);
      color: var(--text-primary);
      font-weight: 500;
    }

    .tag-color-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 4px;
      flex-shrink: 0;
    }

    .tag-new-btn {
      padding: 4px 8px;
      border: 1px dashed var(--border-secondary);
      border-radius: 12px;
      background: transparent;
      color: var(--text-tertiary);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 2px;
    }

    .tag-new-btn:hover {
      border-color: var(--text-secondary);
      color: var(--text-secondary);
      background: var(--bg-tertiary);
    }

    .tag-create-form {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      padding: 12px 14px;
      background: var(--bg-secondary);
      border-radius: 10px;
      margin-top: 8px;
      border: 1px solid var(--border-secondary);
    }

    .tag-create-input {
      flex: 1;
      min-width: 120px;
      padding: 6px 10px;
      border: 1px solid var(--border-secondary);
      border-radius: 6px;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 12px;
      outline: none;
      font-family: inherit;
    }

    .tag-create-input:focus {
      border-color: var(--accent-primary);
    }

    .tag-color-picker {
      display: flex;
      gap: 4px;
    }

    .tag-create-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .tag-color-option {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.15s;
      position: relative;
    }

    .tag-color-option:hover {
      transform: scale(1.2);
    }

    .tag-color-option.selected {
      border-color: var(--accent-primary);
    }

    .tag-color-option.selected::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 8px;
      height: 8px;
      background: white;
      border-radius: 50%;
    }

    .tag-create-actions {
      display: flex;
      gap: 4px;
    }

    .tag-create-btn {
      padding: 4px 10px;
      border: none;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }

    .tag-create-btn.confirm {
      background: var(--accent-primary);
      color: var(--accent-on);
    }

    .tag-create-btn.confirm:hover {
      background: var(--accent-hover);
    }

    .tag-create-btn.cancel {
      background: var(--bg-tertiary);
      color: var(--text-secondary);
    }

    .tag-create-btn.cancel:hover {
      background: var(--border-secondary);
      color: var(--text-primary);
    }

    .tag-create-error {
      width: 100%;
      font-size: 11px;
      color: #ef4444;
      margin-top: 2px;
    }

    .buttons {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      align-items: center;
    }

    .hint {
      flex: 1;
      font-size: 11px;
      color: var(--text-tertiary);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .hint kbd {
      padding: 2px 5px;
      background: var(--bg-tertiary);
      border-radius: 3px;
      font-family: -apple-system, BlinkMacSystemFont, monospace;
      font-size: 10px;
      color: var(--text-secondary);
    }

    button {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      -webkit-app-region: no-drag;
    }

    .btn-cancel {
      background: var(--bg-tertiary);
      color: var(--text-secondary);
    }

    .btn-cancel:hover {
      background: var(--border-secondary);
      color: var(--text-primary);
    }

    .btn-add {
      background: var(--accent-primary);
      color: var(--accent-on);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .btn-add:hover {
      background: var(--accent-hover);
    }

    .btn-add svg {
      width: 12px;
      height: 12px;
    }

    .btn-add:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 5v14M5 12h14"/>
        </svg>
        快速添加任务
      </div>
    </div>

    <div class="input-wrapper">
      <input type="text" id="taskInput" placeholder="输入任务内容，回车确认..." autocomplete="off">
    </div>

    <div class="options">
      <input type="date" id="dateInput" class="date-input" title="期望完成时间">
    </div>

    <div class="tag-row" id="tagRow" style="display: none;">
      <span class="tag-row-label">标签</span>
      <div id="tagContainer"></div>
      <button type="button" class="tag-new-btn" id="tagNewBtn" onclick="showTagCreate()">+ 新建</button>
      <div id="tagCreateForm" style="display: none;">
        <input type="text" class="tag-create-input" id="tagNameInput" placeholder="标签名称" autocomplete="off">
        <div class="tag-create-row">
          <div class="tag-color-picker" id="tagColorPicker"></div>
          <div class="tag-create-actions">
            <button type="button" class="tag-create-btn confirm" onclick="createTag()">创建</button>
            <button type="button" class="tag-create-btn cancel" onclick="hideTagCreate()">取消</button>
          </div>
        </div>
        <div class="tag-create-error" id="tagCreateError"></div>
      </div>
    </div>

    <div class="buttons">
      <div class="hint">
        <kbd>Enter</kbd> 添加
        <kbd>Esc</kbd> 取消
      </div>
      <button class="btn-cancel" onclick="closeWindow()">取消</button>
      <button class="btn-add" id="addBtn" onclick="addTask()" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M12 5v14M5 12h14"/>
        </svg>
        添加
      </button>
    </div>
  </div>

  <script>
    const input = document.getElementById('taskInput');
    const dateInput = document.getElementById('dateInput');
    const addBtn = document.getElementById('addBtn');
    const tagRow = document.getElementById('tagRow');
    const tagContainer = document.getElementById('tagContainer');
    const tagNewBtn = document.getElementById('tagNewBtn');
    const tagCreateForm = document.getElementById('tagCreateForm');
    const tagNameInput = document.getElementById('tagNameInput');
    const tagColorPicker = document.getElementById('tagColorPicker');
    const tagCreateError = document.getElementById('tagCreateError');
    let theme = 'light';
    let tags = [];
    let selectedTagIds = new Set();
    let selectedColor = '#3b82f6';

    const TAG_COLORS = [
      '#ef4444', '#f97316', '#eab308', '#22c55e',
      '#059669', '#06b6d4', '#3b82f6', '#8b5cf6'
    ];

    function renderColorPicker() {
      tagColorPicker.innerHTML = '';
      TAG_COLORS.forEach(color => {
        const option = document.createElement('div');
        option.className = 'tag-color-option' + (selectedColor === color ? ' selected' : '');
        option.style.background = color;
        option.onclick = () => {
          selectedColor = color;
          renderColorPicker();
        };
        option.title = color;
        tagColorPicker.appendChild(option);
      });
    }

    function showTagCreate() {
      tagNewBtn.style.display = 'none';
      tagCreateForm.style.display = 'flex';
      tagNameInput.focus();
      selectedColor = '#3b82f6';
      renderColorPicker();
      tagCreateError.textContent = '';
    }

    function hideTagCreate() {
      tagNewBtn.style.display = 'inline-flex';
      tagCreateForm.style.display = 'none';
      tagNameInput.value = '';
      tagCreateError.textContent = '';
    }

    async function createTag() {
      const name = tagNameInput.value.trim();
      if (!name) {
        tagCreateError.textContent = '请输入标签名称';
        return;
      }

      try {
        await window.electronAPI.createTag(name, selectedColor);
        hideTagCreate();
        await loadTags();
      } catch (error) {
        console.error('Failed to create tag:', error);
        tagCreateError.textContent = '创建标签失败';
      }
    }

    function initTheme() {
      const savedTheme = localStorage.getItem('gtodo-theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      theme = savedTheme || (prefersDark ? 'dark' : 'light');
      applyTheme();
    }

    async function loadTags() {
      try {
        tags = await window.electronAPI.getTags();
        renderTags();
      } catch (error) {
        console.error('Failed to load tags:', error);
      }
    }

    function renderTags() {
      if (tags.length === 0) {
        tagRow.style.display = 'none';
        return;
      }
      tagRow.style.display = 'flex';
      tagContainer.innerHTML = '';
      tags.forEach(tag => {
        const chip = document.createElement('button');
        chip.type = 'button';
        chip.className = 'tag-chip' + (selectedTagIds.has(tag.id) ? ' selected' : '');
        chip.innerHTML = `<span class="tag-color-dot" style="background: ${tag.color}"></span>${tag.name}`;
        chip.onclick = () => toggleTag(tag.id);
        chip.title = tag.name;
        tagContainer.appendChild(chip);
      });
    }

    function toggleTag(tagId) {
      if (selectedTagIds.has(tagId)) {
        selectedTagIds.delete(tagId);
      } else {
        selectedTagIds.add(tagId);
      }
      renderTags();
    }

    function applyTheme() {
      document.documentElement.setAttribute('data-theme', theme);
    }

    // 监听主窗口主题变化，实时同步
    window.addEventListener('storage', (e) => {
      if (e.key === 'gtodo-theme' && e.newValue && e.newValue !== theme) {
        theme = e.newValue;
        applyTheme();
      }
    });

    // 监听 storage key 变化（同一窗口也能触发）
    setInterval(() => {
      const current = localStorage.getItem('gtodo-theme');
      if (current && current !== theme) {
        theme = current;
        applyTheme();
      }
    }, 300);

    function updateAddButton() {
      addBtn.disabled = !input.value.trim();
    }

    input.focus();
    input.addEventListener('input', updateAddButton);

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        addTask();
      } else if (e.key === 'Escape') {
        closeWindow();
      }
    });

    async function addTask() {
      const title = input.value.trim();
      if (!title) return;

      try {
        addBtn.disabled = true;
        const created = await window.electronAPI.createTask({
          title,
          description: '',
          status: 'todo',
          parent_id: null,
          extends_task_id: null,
          expected_date: dateInput.value || null,
        });
        if (selectedTagIds.size > 0) {
          const tagIdNumbers = Array.from(selectedTagIds).map(id => Number(id));
          await window.electronAPI.setTaskTags(Number(created.id), tagIdNumbers);
        }
        window.electronAPI.refreshTasks && window.electronAPI.refreshTasks();
        window.electronAPI.closeQuickInput();
      } catch (error) {
        console.error('Failed to add task:', error);
        addBtn.disabled = false;
      }
    }

    function closeWindow() {
      window.electronAPI.closeQuickInput();
    }

    initTheme();
    updateAddButton();
    loadTags();
  </script>
</body>
</html>
